<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="header-title">My To Do List</h1>
        <p class="header-subtitle">Kelola tugas harianmu dengan mudah</p>
      </header>

      <!-- Input Section -->
      <div class="input-section">
        <div class="input-wrapper">
          <i class="fas fa-plus input-icon"></i>
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="Tambahkan tugas baru..."
            maxlength="100"
            autocomplete="off"
          />
          <button id="addBtn" class="add-btn" onclick="addTask()">
            Tambah
          </button>
        </div>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all" onclick="filterTasks('all', this)">
          Semua <span class="count" id="countAll">0</span>
        </button>
        <button class="filter-btn" data-filter="active" onclick="filterTasks('active', this)">
          Aktif <span class="count" id="countActive">0</span>
        </button>
        <button class="filter-btn" data-filter="completed" onclick="filterTasks('completed', this)">
          Selesai <span class="count" id="countCompleted">0</span>
        </button>
      </div>

      <!-- Task List -->
      <ul class="task-list" id="taskList">
        <!-- Tasks will be rendered here by JavaScript -->
      </ul>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <i class="fas fa-clipboard-list empty-icon"></i>
        <p class="empty-title">Belum ada tugas</p>
        <p class="empty-desc">Tambahkan tugas baru di atas untuk memulai</p>
      </div>

      <!-- Footer Actions -->
      <div class="footer-actions" id="footerActions">
        <span class="task-summary" id="taskSummary"></span>
        <button class="clear-btn" onclick="clearCompleted()">
          <i class="fas fa-trash-alt"></i> Hapus Selesai
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
